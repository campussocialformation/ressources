<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ressources ME/TISF – AES · IRTS Parmentier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --papier:#FAF9F6;
    --papier-leger:#F1EFE9;
    --encre:#1C1C1A;
    --encre-douce:#5B5A54;
    --ligne:#DEDAD0;

    --bleu:#3D5A6C;
    --bleu-clair:#E7EDEF;
    --terre:#9C6B47;
    --terre-clair:#F3E9E0;
    --sauge:#6B7F5E;
    --sauge-clair:#EAEEE6;

    --serif: 'Source Serif 4', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'IBM Plex Mono', monospace;

    --rayon: 3px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:var(--papier);
    color:var(--encre);
    font-family:var(--sans);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  a{ color:inherit; text-decoration:none; }

  /* ===== HEADER ===== */
  header.site{
    border-bottom:1px solid var(--ligne);
    padding:28px 32px 24px;
    background:var(--papier);
  }
  .site-title{
    font-family:var(--serif);
    font-weight:600;
    font-size:1.5rem;
    letter-spacing:-0.01em;
    cursor:pointer;
    display:inline-block;
  }
  .site-sub{
    font-family:var(--mono);
    font-size:0.72rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--encre-douce);
    margin-top:6px;
  }

  /* ===== FIL D'ARIANE (signature) ===== */
  nav.fil{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:0;
    padding:14px 32px;
    background:var(--papier-leger);
    border-bottom:1px solid var(--ligne);
    font-family:var(--mono);
    font-size:0.78rem;
  }
  .fil-etape{
    color:var(--encre-douce);
    padding:4px 2px;
    cursor:pointer;
    transition:color .15s ease;
  }
  .fil-etape:hover{ color:var(--encre); text-decoration:underline; }
  .fil-etape.actif{
    color:var(--encre);
    font-weight:500;
    cursor:default;
  }
  .fil-etape.actif:hover{ text-decoration:none; }
  .fil-connecteur{
    color:var(--ligne);
    margin:0 10px;
    letter-spacing:2px;
  }
  .fil-connecteur::after{ content:'···'; }

  /* ===== MAIN ===== */
  main{
    max-width:980px;
    margin:0 auto;
    padding:48px 32px 96px;
  }

  .page-titre{
    font-family:var(--serif);
    font-size:2rem;
    font-weight:600;
    letter-spacing:-0.015em;
    margin-bottom:10px;
  }
  .page-accroche{
    color:var(--encre-douce);
    font-size:1rem;
    max-width:620px;
    margin-bottom:40px;
  }

  /* ===== GRILLE DE CARTES (accueil / blocs) ===== */
  .grille{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:16px;
  }
  .carte{
    border:1px solid var(--ligne);
    border-radius:var(--rayon);
    padding:24px;
    background:#fff;
    cursor:pointer;
    transition:border-color .15s ease, transform .12s ease;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .carte:hover{
    transform:translateY(-2px);
  }
  .carte:focus-visible{ outline:2px solid var(--encre); outline-offset:2px; }

  .carte-badge{
    font-family:var(--mono);
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.07em;
    display:inline-block;
    padding:3px 9px;
    border-radius:20px;
    width:fit-content;
  }
  .carte-titre{
    font-family:var(--serif);
    font-weight:600;
    font-size:1.15rem;
    line-height:1.3;
  }
  .carte-desc{
    color:var(--encre-douce);
    font-size:0.88rem;
    line-height:1.45;
  }

  /* couleurs de filière */
  .c-bleu{ border-left:3px solid var(--bleu); }
  .c-bleu .carte-badge{ background:var(--bleu-clair); color:var(--bleu); }
  .c-terre{ border-left:3px solid var(--terre); }
  .c-terre .carte-badge{ background:var(--terre-clair); color:var(--terre); }
  .c-sauge{ border-left:3px solid var(--sauge); }
  .c-sauge .carte-badge{ background:var(--sauge-clair); color:var(--sauge); }

  .carte.c-bleu:hover{ border-color:var(--bleu); }
  .carte.c-terre:hover{ border-color:var(--terre); }
  .carte.c-sauge:hover{ border-color:var(--sauge); }

  /* ===== SECTIONS DE CATEGORIE (dans un bloc) ===== */
  .categorie{
    margin-bottom:36px;
  }
  .categorie-entete{
    display:flex;
    align-items:baseline;
    gap:10px;
    border-bottom:1px solid var(--ligne);
    padding-bottom:10px;
    margin-bottom:16px;
  }
  .categorie-titre{
    font-family:var(--serif);
    font-weight:600;
    font-size:1.2rem;
  }
  .categorie-compte{
    font-family:var(--mono);
    font-size:0.74rem;
    color:var(--encre-douce);
  }

  .sous-groupe{
    margin-bottom:20px;
  }
  .sous-groupe-nom{
    font-family:var(--mono);
    font-size:0.74rem;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--encre-douce);
    margin-bottom:10px;
  }

  /* ===== LISTE DE RESSOURCES ===== */
  .liste-ressources{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .ressource{
    display:grid;
    grid-template-columns:auto 1fr auto;
    align-items:start;
    column-gap:12px;
    row-gap:4px;
    padding:13px 16px;
    border:1px solid var(--ligne);
    border-radius:var(--rayon);
    background:#fff;
    transition:border-color .15s ease, background .15s ease;
  }
  .ressource:hover{
    border-color:var(--encre);
    background:var(--papier-leger);
  }
  .ressource-icone{
    font-family:var(--mono);
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.04em;
    padding:3px 7px;
    border-radius:3px;
    background:var(--papier-leger);
    color:var(--encre-douce);
    flex-shrink:0;
    white-space:nowrap;
    align-self:center;
  }
  .ressource-corps{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }
  .ressource-titre{
    font-weight:500;
    font-size:0.94rem;
    line-height:1.35;
  }
  .ressource-note{
    color:var(--encre-douce);
    font-size:0.82rem;
    line-height:1.4;
  }
  .ressource-fleche{
    color:var(--encre-douce);
    font-size:0.85rem;
    align-self:center;
  }

  .etat-vide{
    color:var(--encre-douce);
    font-size:0.88rem;
    font-style:italic;
    padding:14px 16px;
    border:1px dashed var(--ligne);
    border-radius:var(--rayon);
  }

  /* ===== RETOUR ===== */
  .lien-retour{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-family:var(--mono);
    font-size:0.8rem;
    color:var(--encre-douce);
    margin-bottom:28px;
    cursor:pointer;
  }
  .lien-retour:hover{ color:var(--encre); }

  footer.site{
    text-align:center;
    padding:32px;
    color:var(--encre-douce);
    font-family:var(--mono);
    font-size:0.72rem;
    border-top:1px solid var(--ligne);
  }

  @media (max-width:600px){
    header.site{ padding:20px; }
    nav.fil{ padding:12px 20px; }
    main{ padding:32px 20px 64px; }
    .page-titre{ font-size:1.6rem; }
  }
</style>
</head>
<body>

<header class="site">
  <span class="site-title" id="lien-accueil" tabindex="0" role="button">Ressources ME/TISF – AES</span>
  <div class="site-sub">IRTS Parmentier · annuaire des ressources pédagogiques</div>
</header>

<nav class="fil" id="fil-ariane"></nav>

<main id="contenu"></main>

<footer class="site">Mis à jour manuellement · ressources.json</footer>

<script>
let DONNEES = null;

const COULEUR_CLASSE = { bleu: 'c-bleu', terre: 'c-terre', sauge: 'c-sauge' };
const ICONES_TYPE = { lien: 'SITE', pdf: 'PDF', doc: 'DOC', video: 'VIDEO' };

async function chargerDonnees(){
  const res = await fetch('resources.json', { cache: 'no-store' });
  DONNEES = await res.json();
}

/* ===== ROUTAGE simple basé sur le hash ===== */
function lireRoute(){
  const h = location.hash.replace('#','');
  return h ? h.split('/') : [];
}
function naviguer(chemin){
  location.hash = chemin.join('/');
}

window.addEventListener('hashchange', rendre);
document.getElementById('lien-accueil').addEventListener('click', ()=> naviguer([]));
document.getElementById('lien-accueil').addEventListener('keydown', e=>{ if(e.key==='Enter') naviguer([]); });

async function init(){
  await chargerDonnees();
  rendre();
}

function trouverFiliere(id){ return DONNEES.filieres.find(f=>f.id===id); }
function trouverBloc(filiere, blocId){ return filiere.blocs.find(b=>b.id===blocId); }

function rendre(){
  const route = lireRoute();
  const contenu = document.getElementById('contenu');
  const fil = document.getElementById('fil-ariane');

  if(route.length===0){
    fil.innerHTML = filEtape('Accueil', true);
    contenu.innerHTML = vueAccueil();
  }
  else if(route[0]==='transversal'){
    fil.innerHTML = filEtape('Accueil', false, []) + connecteur() + filEtape('Contenus transversaux', true);
    contenu.innerHTML = vueTransversal();
  }
  else {
    const filiere = trouverFiliere(route[0]);
    if(!filiere){ contenu.innerHTML = vueIntrouvable(); fil.innerHTML=''; return; }

    if(route.length===1){
      fil.innerHTML = filEtape('Accueil', false, []) + connecteur() + filEtape(filiere.nom, true);
      contenu.innerHTML = vueFiliere(filiere);
    } else {
      const bloc = trouverBloc(filiere, route[1]);
      if(!bloc){ contenu.innerHTML = vueIntrouvable(); return; }
      fil.innerHTML = filEtape('Accueil', false, [])
        + connecteur() + filEtape(filiere.nom, false, [filiere.id])
        + connecteur() + filEtape('Bloc '+bloc.numero, true);
      contenu.innerHTML = vueBloc(filiere, bloc);
    }
  }

  attacherClicsCartes();
}

function connecteur(){ return '<span class="fil-connecteur"></span>'; }
function filEtape(label, actif, chemin){
  const cls = actif ? 'fil-etape actif' : 'fil-etape';
  const data = (!actif && chemin) ? `data-nav="${chemin.join('/')}"` : '';
  return `<span class="${cls}" ${data} ${!actif?'role="button" tabindex="0"':''}>${label}</span>`;
}

function attacherClicsCartes(){
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.addEventListener('click', ()=> naviguer(el.dataset.nav ? el.dataset.nav.split('/') : []));
    el.addEventListener('keydown', e=>{ if(e.key==='Enter') naviguer(el.dataset.nav ? el.dataset.nav.split('/') : []); });
  });
}

/* ===== VUES ===== */

function vueAccueil(){
  const t = DONNEES.contenus_transversaux;
  let cartesFilieres = DONNEES.filieres.map(f => `
    <div class="carte ${COULEUR_CLASSE[f.couleur]}" data-nav="${f.id}" tabindex="0" role="button">
      <span class="carte-badge">${f.blocs.length} blocs</span>
      <div class="carte-titre">${f.nom}</div>
      <div class="carte-desc">${f.nom_complet}</div>
    </div>
  `).join('');

  let carteTransversale = `
    <div class="carte ${COULEUR_CLASSE[t.couleur]}" data-nav="transversal" tabindex="0" role="button">
      <span class="carte-badge">Commun</span>
      <div class="carte-titre">${t.nom}</div>
      <div class="carte-desc">${t.accroche}</div>
    </div>
  `;

  return `
    <h1 class="page-titre">Choisir une filière</h1>
    <p class="page-accroche">Retrouvez les épreuves certificatives, contenus pédagogiques et capsules pédagogiques classés par bloc de compétences.</p>
    <div class="grille">${cartesFilieres}${carteTransversale}</div>
  `;
}

function vueFiliere(filiere){
  const cartesBlocs = filiere.blocs.map(b => `
    <div class="carte ${COULEUR_CLASSE[filiere.couleur]}" data-nav="${filiere.id}/${b.id}" tabindex="0" role="button">
      <span class="carte-badge">Bloc ${b.numero}</span>
      <div class="carte-titre">${b.intitule}</div>
    </div>
  `).join('');

  return `
    <span class="lien-retour" data-nav="">← Retour à l'accueil</span>
    <h1 class="page-titre">${filiere.nom}</h1>
    <p class="page-accroche">${filiere.nom_complet}<br>${filiere.accroche}</p>
    <div class="grille">${cartesBlocs}</div>
  `;
}

function vueBloc(filiere, bloc){
  const cat = bloc.categories;

  const compteEpreuve = (cat.epreuve_certificative.sous_groupes||[]).reduce((s,g)=>s+g.ressources.length,0);

  const sousGroupesHTML = (cat.epreuve_certificative.sous_groupes||[]).map(g => `
    <div class="sous-groupe">
      <div class="sous-groupe-nom">${g.nom}</div>
      ${listeRessources(g.ressources)}
    </div>
  `).join('');

  return `
    <span class="lien-retour" data-nav="${filiere.id}">← Retour à ${filiere.nom}</span>
    <h1 class="page-titre">Bloc ${bloc.numero}</h1>
    <p class="page-accroche">${bloc.intitule}</p>

    <section class="categorie">
      <div class="categorie-entete">
        <span class="categorie-titre">${cat.epreuve_certificative.label}</span>
        <span class="categorie-compte">${compteEpreuve} ressource${compteEpreuve===1?'':'s'}</span>
      </div>
      ${sousGroupesHTML}
    </section>

    <section class="categorie">
      <div class="categorie-entete">
        <span class="categorie-titre">${cat.contenus_pedagogiques.label}</span>
        <span class="categorie-compte">${cat.contenus_pedagogiques.ressources.length} ressource${cat.contenus_pedagogiques.ressources.length===1?'':'s'}</span>
      </div>
      ${listeRessources(cat.contenus_pedagogiques.ressources)}
    </section>

    <section class="categorie">
      <div class="categorie-entete">
        <span class="categorie-titre">${cat.capsules_pedagogiques.label}</span>
        <span class="categorie-compte">${cat.capsules_pedagogiques.ressources.length} ressource${cat.capsules_pedagogiques.ressources.length===1?'':'s'}</span>
      </div>
      ${listeRessources(cat.capsules_pedagogiques.ressources)}
    </section>
  `;
}

function vueTransversal(){
  const t = DONNEES.contenus_transversaux;
  return `
    <span class="lien-retour" data-nav="">← Retour à l'accueil</span>
    <h1 class="page-titre">${t.nom}</h1>
    <p class="page-accroche">${t.accroche}</p>
    <section class="categorie">
      ${listeRessources(t.ressources)}
    </section>
  `;
}

function vueIntrouvable(){
  return `
    <span class="lien-retour" data-nav="">← Retour à l'accueil</span>
    <h1 class="page-titre">Page introuvable</h1>
    <p class="page-accroche">Cette ressource n'existe pas ou a été déplacée.</p>
  `;
}

function listeRessources(ressources){
  if(!ressources || ressources.length===0){
    return `<div class="etat-vide">Aucune ressource pour le moment.</div>`;
  }
  return `<div class="liste-ressources">` + ressources.map(r => `
    <a class="ressource" href="${r.url}" target="_blank" rel="noopener noreferrer">
      <span class="ressource-icone">${ICONES_TYPE[r.type] || r.type.toUpperCase()}</span>
      <span class="ressource-corps">
        <span class="ressource-titre">${r.titre}</span>
        ${r.note ? `<span class="ressource-note">${r.note}</span>` : ''}
      </span>
      <span class="ressource-fleche">↗</span>
    </a>
  `).join('') + `</div>`;
}

init();
</script>

</body>
</html>
